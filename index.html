<!DOCTYPE html>
<html>
<head>
  <title>My Forum</title>
  <style>
    body { font-family: Arial; margin: 20px; }

    .box {
      padding: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .hidden { display: none; }

    button { margin-left: 5px; }
  </style>
</head>

<body>

<h1>My Forum</h1>

<input id="username" placeholder="Username">
<button onclick="saveUser()">Save</button>

<hr>

<div id="viewCategories"></div>

<div id="viewSubforums" class="hidden">
  <button onclick="backToCategories()">← Back</button>
  <h2 id="categoryTitle"></h2>
  <div id="subforums"></div>
</div>

<div id="viewThreads" class="hidden">
  <button onclick="backToSubforums()">← Back</button>
  <h2 id="subforumTitle"></h2>

  <input id="threadTitleInput" placeholder="Thread title">
  <button onclick="createThread()">Create</button>

  <div id="threads"></div>
</div>

<div id="viewPosts" class="hidden">
  <button onclick="backToThreads()">← Back</button>

  <h2 id="threadTitle"></h2>

  <div id="posts"></div>

  <textarea id="postText"></textarea>
  <button onclick="addPost()">Reply</button>
</div>

<script>

let currentCategory, currentSubforum, currentThread;
let threads = [];
let posts = [];

// =====================
// USER SYSTEM (FIXED)
// =====================

// restore user on page load
const usernameInput = document.getElementById('username');

const savedUser = localStorage.getItem("user");
if (savedUser) {
  usernameInput.value = savedUser;
}

// save user
function saveUser() {
  const name = usernameInput.value.trim();

  if (!name) return;

  localStorage.setItem("user", name);
}

// INIT
loadCategories();

async function loadCategories() {
  const res = await fetch('/api/categories');
  const data = await res.json();

  const div = document.getElementById('viewCategories');
  div.innerHTML = '';

  data.forEach(c => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerText = c.name;
    el.onclick = () => openCategory(c);
    div.appendChild(el);
  });
}

async function openCategory(c) {
  currentCategory = c;

  document.getElementById('viewCategories').classList.add('hidden');
  document.getElementById('viewSubforums').classList.remove('hidden');

  document.getElementById('categoryTitle').innerText = c.name;

  const res = await fetch(`/api/subforums/${c._id}`);
  const data = await res.json();

  const div = document.getElementById('subforums');
  div.innerHTML = '';

  data.forEach(s => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerText = s.name;
    el.onclick = () => openSubforum(s);
    div.appendChild(el);
  });
}

async function openSubforum(s) {
  currentSubforum = s;

  document.getElementById('viewSubforums').classList.add('hidden');
  document.getElementById('viewThreads').classList.remove('hidden');

  document.getElementById('subforumTitle').innerText = s.name;

  const res = await fetch(`/api/threads/${s._id}`);
  threads = await res.json();

  renderThreads();
}

function renderThreads() {
  const div = document.getElementById('threads');
  div.innerHTML = '';

  threads.forEach(t => {
    const el = document.createElement('div');
    el.className = 'box';

    const date = t.createdAt ? new Date(t.createdAt).toLocaleString() : '';

    el.innerHTML = `
      <b>${t.title}</b><br>
      by ${t.author}<br>
      <small>${date} • ${t.replyCount || 0} replies</small>
      <br>
      <button onclick="editThread('${t._id}')">Edit</button>
      <button onclick="deleteThread('${t._id}')">Delete</button>
    `;

    el.onclick = (e) => {
      if (!e.target.tagName === "BUTTON") openThread(t);
    };

    el.addEventListener("click", () => openThread(t));

    div.appendChild(el);
  });
}

async function createThread() {
  await fetch('/api/threads', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      title: document.getElementById('threadTitleInput').value,
      subforumId: currentSubforum._id,
      author: getUser()
    })
  });

  openSubforum(currentSubforum);
}

async function openThread(t) {
  currentThread = t;

  document.getElementById('viewThreads').classList.add('hidden');
  document.getElementById('viewPosts').classList.remove('hidden');

  document.getElementById('threadTitle').innerText = t.title;

  const res = await fetch(`/api/posts/${t._id}`);
  posts = await res.json();

  renderPosts();
}

function renderPosts() {
  const div = document.getElementById('posts');
  div.innerHTML = '';

  posts.forEach(p => {
    const el = document.createElement('div');
    el.className = 'box';

    const date = p.createdAt ? new Date(p.createdAt).toLocaleString() : '';

    el.innerHTML = `
      <b>${p.author}</b> <small>${date}</small><br>
      ${p.text}
      <br>
      <button onclick="editPost('${p._id}')">Edit</button>
      <button onclick="deletePost('${p._id}')">Delete</button>
    `;

    div.appendChild(el);
  });
}

async function addPost() {
  await fetch('/api/posts', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      threadId: currentThread._id,
      text: document.getElementById('postText').value,
      author: getUser()
    })
  });

  openThread(currentThread);
}

function backToCategories(){ location.reload(); }
function backToSubforums(){ openCategory(currentCategory); }
function backToThreads(){ openSubforum(currentSubforum); }

</script>

</body>
</html>
