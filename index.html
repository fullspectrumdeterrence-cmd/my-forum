<!DOCTYPE html>
<html>
<head>
  <title>My Forum</title>

  <style>
    body { font-family: Arial; margin: 20px; }

    .box {
      padding: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .hidden { display: none; }

    small { color: #666; display: block; margin-top: 5px; }
  </style>
</head>

<body>

<h1>My Forum</h1>

<input id="username" placeholder="Username">
<button onclick="saveUser()">Save</button>

<hr>

<div id="categoriesView"></div>

<div id="subforumsView" class="hidden"></div>

<div id="threadsView" class="hidden"></div>

<div id="postsView" class="hidden">
  <h2 id="threadTitle"></h2>
  <div id="posts"></div>

  <textarea id="postText"></textarea>
  <button onclick="addPost()">Reply</button>

  <br><br>
  <button onclick="backToThreads()">Back</button>
</div>

<script>

let currentCategory = null;
let currentSubforum = null;
let currentThread = null;
let threads = [];
let posts = [];

function saveUser() {
  localStorage.setItem("user", document.getElementById("username").value);
}

document.getElementById("username").value =
  localStorage.getItem("user") || "";


// =========================
// LOAD CATEGORIES
// =========================
async function loadCategories() {
  const res = await fetch('/api/categories');
  const data = await res.json();

  const div = document.getElementById('categoriesView');
  div.innerHTML = '';

  data.forEach(c => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerText = c.name;

    el.onclick = () => openCategory(c);

    div.appendChild(el);
  });
}


// =========================
// CATEGORY
// =========================
async function openCategory(category) {
  currentCategory = category;

  hideAll();
  document.getElementById('subforumsView').classList.remove('hidden');

  const res = await fetch(`/api/subforums/${category._id}`);
  const data = await res.json();

  const div = document.getElementById('subforumsView');
  div.innerHTML = `<h2>${category.name}</h2>`;

  data.forEach(s => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerText = s.name;
    el.onclick = () => openSubforum(s);
    div.appendChild(el);
  });
}


// =========================
// SUBFORUM
// =========================
async function openSubforum(subforum) {
  currentSubforum = subforum;

  hideAll();
  document.getElementById('threadsView').classList.remove('hidden');

  const res = await fetch(`/api/threads/${subforum._id}`);
  threads = await res.json();

  const div = document.getElementById('threadsView');
  div.innerHTML = `<h2>${subforum.name}</h2>`;

  threads.forEach(t => {
    const el = document.createElement('div');
    el.className = 'box';

    el.innerHTML = `
      <b>${t.title}</b>
      <small>${t.replyCount} replies • Last by ${t.lastPostAuthor || "N/A"}</small>
    `;

    el.onclick = () => openThread(t);
    div.appendChild(el);
  });
}


// =========================
// THREAD
// =========================
async function openThread(thread) {
  currentThread = thread;

  hideAll();
  document.getElementById('postsView').classList.remove('hidden');

  document.getElementById('threadTitle').innerText = thread.title;

  const res = await fetch(`/api/posts/${thread._id}`);
  posts = await res.json();

  renderPosts();
}


// =========================
// POSTS
// =========================
function renderPosts() {
  const div = document.getElementById('posts');
  div.innerHTML = '';

  posts.forEach(p => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerHTML = `<b>${p.author}</b>: ${p.text}`;
    div.appendChild(el);
  });
}


// =========================
// ADD POST
// =========================
async function addPost() {
  const text = document.getElementById('postText').value;
  const author = document.getElementById('username').value;

  await fetch('/api/posts', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      threadId: currentThread._id,
      text,
      author
    })
  });

  openThread(currentThread);
}


// =========================
// NAVIGATION FIX
// =========================
function hideAll() {
  document.getElementById('categoriesView').classList.add('hidden');
  document.getElementById('subforumsView').classList.add('hidden');
  document.getElementById('threadsView').classList.add('hidden');
  document.getElementById('postsView').classList.add('hidden');
}

function backToThreads() {
  openSubforum(currentSubforum);
}


// =========================
// INIT
// =========================
loadCategories();

</script>

</body>
</html>
