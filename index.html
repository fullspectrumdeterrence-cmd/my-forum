<!DOCTYPE html>
<html>
<head>
  <title>My Forum</title>

  <!-- ===================================================== -->
  <!-- SECTION 2.5 - STYLES -->
  <!-- ===================================================== -->
  <style>
    body { font-family: Arial; margin: 20px; }

    .box {
      padding: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .hidden { display: none; }

    button { margin-left: 5px; }
    small { color: #666; }

    /* SECTION 2.5.1 - ROW SYSTEM */
    .row {
      display: flex;
      justify-content: space-between;
    }

    .row-left { flex: 1; text-align: left; }
    .row-center { flex: 1; text-align: center; }
    .row-right { flex: 1; text-align: right; font-size: 12px; color: #666; }

    /* SECTION 2.5.2 - BREADCRUMB INTERACTIVITY */

#breadcrumb span {
  cursor: pointer;
  color: #007BFF;
}

#breadcrumb span:hover {
  text-decoration: underline;
}

#breadcrumb span:last-child {
  cursor: default;
  color: black;
  text-decoration: none;
}
  </style>
</head>

<body>

<h1 onclick="goCategories()" style="cursor:pointer;">My Forum</h1>

<!-- ===================================================== -->
<!-- SECTION 1.0 - USER SYSTEM -->
<!-- ===================================================== -->
<input id="username" placeholder="Username">
<button onclick="saveUser()">Save</button>

<hr>

<!-- ===================================================== -->
<!-- SECTION 2.6 - BREADCRUMB -->
<!-- ===================================================== -->
<div id="breadcrumb"></div>

<!-- ===================================================== -->
<!-- SECTION 2.0 - VIEWS -->
<!-- ===================================================== -->

<!-- SECTION 2.1 -->
<div id="viewCategories"></div>

<!-- SECTION 2.2 -->
<div id="viewSubforums" class="hidden">
  <button onclick="goCategories()">← Back</button>
  <h2 id="categoryTitle"></h2>
  <div id="subforums"></div>
</div>

<!-- SECTION 2.3 -->
<div id="viewThreads" class="hidden">
  <button onclick="goSubforums()">← Back</button>
  <h2 id="subforumTitle"></h2>

  <input id="threadTitleInput">
  <button onclick="createThread()">Create</button>

  <div id="threads"></div>
</div>

<!-- SECTION 2.4 -->
<div id="viewPosts" class="hidden">
  <button onclick="goThreads()">← Back</button>

  <h2 id="threadTitle"></h2>

  <div id="posts"></div>

  <textarea id="postText"></textarea>
  <button onclick="addPost()">Reply</button>
</div>

<script>

////////////////////////////////////////////////////////////////////////////////
// SECTION 3.0 - STATE
////////////////////////////////////////////////////////////////////////////////

// SECTION 3.1 - ACTIVE OBJECTS
let currentCategory = null;
let currentSubforum = null;
let currentThread = null;

// SECTION 3.2 - DATA CACHE
let threads = [];
let posts = [];

////////////////////////////////////////////////////////////////////////////////
// SECTION 4.0 - USER SYSTEM
////////////////////////////////////////////////////////////////////////////////

// SECTION 4.1 - INIT USER
const usernameInput = document.getElementById('username');

if (localStorage.getItem("user")) {
  usernameInput.value = localStorage.getItem("user");
}

// SECTION 4.2 - SAVE USER
function saveUser() {
  localStorage.setItem("user", usernameInput.value);
}

// SECTION 4.3 - GET USER
function getUser() {
  return localStorage.getItem("user") || "Anonymous";
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 5.0 - VIEW SYSTEM
////////////////////////////////////////////////////////////////////////////////

// SECTION 5.1 - SWITCH VIEW
function showView(view) {
  const views = ["Categories","Subforums","Threads","Posts"];

  views.forEach(v => {
    document.getElementById("view"+v).classList.add("hidden");
  });

  document.getElementById("view"+capitalize(view)).classList.remove("hidden");
}

// SECTION 5.2 - HELPER
function capitalize(s){
  return s.charAt(0).toUpperCase()+s.slice(1);
}

// SECTION 5.3 - BREADCRUMB SYSTEM (FIXED CLICK HANDLING)

function updateBreadcrumb() {
  const el = document.getElementById("breadcrumb");

  let html = `<span onclick="goCategories()">Home</span>`;

  // SECTION 5.3.1 - CATEGORY
  if (currentCategory) {
    html += ` > <span onclick="handleCategoryClick('${currentCategory._id}')">
      ${currentCategory.name}
    </span>`;
  }

  // SECTION 5.3.2 - SUBFORUM (FIXED)
  if (currentSubforum) {
    html += ` > <span onclick="handleSubforumClick('${currentSubforum._id}')">
      ${currentSubforum.name}
    </span>`;
  }

  // SECTION 5.3.3 - THREAD (NOT CLICKABLE)
  if (currentThread) {
    html += ` > <span>
      ${currentThread.title}
    </span>`;
  }

  el.innerHTML = html;
}

  // SECTION 5.4 - CATEGORY CLICK HANDLER

async function handleCategoryClick(catId) {
  const cats = await fetch('/api/categories').then(r => r.json());
  const cat = cats.find(c => c._id === catId);
  if (cat) openCategory(cat);
}

  // SECTION 5.5 - SUBFORUM CLICK HANDLER

async function handleSubforumClick(subId) {
  if (!currentCategory) return;

  const subs = await fetch(`/api/subforums/${currentCategory._id}`)
    .then(r => r.json());

  const sub = subs.find(s => s._id === subId);
  if (sub) openSubforum(sub);
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 6.0 - INIT
////////////////////////////////////////////////////////////////////////////////

// SECTION 6.1 - INITIAL LOAD
loadCategories();

// SECTION 6.2 - LOAD FROM URL
loadFromURL();

////////////////////////////////////////////////////////////////////////////////
// SECTION 7.0 - CATEGORIES
////////////////////////////////////////////////////////////////////////////////

// SECTION 7.1 - LOAD
async function loadCategories() {
  const data = await fetch('/api/categories').then(r=>r.json());

  const div = document.getElementById('viewCategories');
  div.innerHTML = '';

  data.forEach(c => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerText = c.name;
    el.onclick = () => openCategory(c);
    div.appendChild(el);
  });
}

// SECTION 7.2 - OPEN CATEGORY
async function openCategory(c) {
  currentCategory = c;
  currentSubforum = null;
  currentThread = null;

  showView("subforums");
  document.getElementById('categoryTitle').innerText = c.name;

  const data = await fetch(`/api/subforums/${c._id}`).then(r=>r.json());

  const div = document.getElementById('subforums');
  div.innerHTML = '';

  data.forEach(s => {
    const el = document.createElement('div');
    el.className = 'box';

    el.innerHTML = `
      <div class="row">
        <div class="row-left">${s.name}</div>
        <div class="row-center">${s.threadCount || 0} Threads</div>
        <div class="row-right">${s.lastActivity ? new Date(s.lastActivity).toLocaleString() : ""}</div>
      </div>
    `;

    el.onclick = () => openSubforum(s);
    div.appendChild(el);
  });

  // SECTION 7.2.1 - STATE UPDATE
  updateBreadcrumb();
  updateURL();
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 8.0 - SUBFORUMS
////////////////////////////////////////////////////////////////////////////////

// SECTION 8.1 - OPEN SUBFORUM
async function openSubforum(s) {
  currentSubforum = s;
  currentThread = null;

  showView("threads");
  document.getElementById('subforumTitle').innerText = s.name;

  threads = await fetch(`/api/threads/${s._id}`).then(r=>r.json());

  renderThreads();

  // SECTION 8.1.1 - STATE UPDATE
  updateBreadcrumb();
  updateURL();
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 9.0 - THREADS
////////////////////////////////////////////////////////////////////////////////

// SECTION 9.1 - RENDER THREADS
function renderThreads() {
  const div = document.getElementById('threads');
  div.innerHTML = '';

  threads.forEach(t => {
    const el = document.createElement('div');
    el.className = 'box';

    el.innerHTML = `
      <div class="row">
        <div class="row-left">${t.author}</div>
        <div class="row-center">${t.replyCount || 0} Replies</div>
        <div class="row-right">${t.lastActivity ? new Date(t.lastActivity).toLocaleString() : ""}</div>
      </div>

      <b>${t.title}</b><br>

      <button onclick="editThread(event,'${t._id}','${t.title}')">Edit</button>
      <button onclick="deleteThread(event,'${t._id}')">Delete</button>
    `;

    el.addEventListener("click", () => openThread(t));
    div.appendChild(el);
  });
}

// SECTION 9.2 - CREATE THREAD
async function createThread() {
  await fetch('/api/threads',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      title: document.getElementById('threadTitleInput').value,
      subforumId: currentSubforum._id,
      author: getUser()
    })
  });

  openSubforum(currentSubforum);
}

// SECTION 9.3 - EDIT THREAD
async function editThread(e,id,title){
  e.stopPropagation();
  const t = prompt("Edit:",title);
  if(!t) return;

  await fetch(`/api/threads/${id}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({title:t})
  });

  openSubforum(currentSubforum);
}

// SECTION 9.4 - DELETE THREAD
async function deleteThread(e,id){
  e.stopPropagation();
  if(!confirm("Delete?")) return;

  await fetch(`/api/threads/${id}`,{method:'DELETE'});
  openSubforum(currentSubforum);
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 10.0 - POSTS
////////////////////////////////////////////////////////////////////////////////

// SECTION 10.1 - OPEN THREAD
async function openThread(t){
  currentThread = t;

  showView("posts");
  document.getElementById('threadTitle').innerText = t.title;

  posts = await fetch(`/api/posts/${t._id}`).then(r=>r.json());

  renderPosts();

  // SECTION 10.1.1 - STATE UPDATE
  updateBreadcrumb();
  updateURL();
}

// SECTION 10.2 - RENDER POSTS
function renderPosts(){
  const div = document.getElementById('posts');
  div.innerHTML='';

  posts.forEach(p=>{
    const el = document.createElement('div');
    el.className='box';

    el.innerHTML=`
      <b>${p.author}</b> <small>${new Date(p.createdAt).toLocaleString()}</small><br>
      ${p.text}<br>
      <button onclick="editPost(event,'${p._id}','${p.text}')">Edit</button>
      <button onclick="deletePost(event,'${p._id}')">Delete</button>
    `;

    div.appendChild(el);
  });
}

// SECTION 10.3 - ADD POST
async function addPost(){
  await fetch('/api/posts',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      threadId: currentThread._id,
      text: document.getElementById('postText').value,
      author: getUser()
    })
  });

  openThread(currentThread);
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 11.0 - NAVIGATION
////////////////////////////////////////////////////////////////////////////////

// SECTION 11.1 - HOME
function goCategories(){
  currentCategory=null;
  currentSubforum=null;
  currentThread=null;

  loadCategories();
  showView("categories");

  updateBreadcrumb();
}

// SECTION 11.2 - SUBFORUM BACK
function goSubforums(){
  openCategory(currentCategory);
}

// SECTION 11.3 - THREAD BACK
function goThreads(){
  openSubforum(currentSubforum);
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 12.0 - URL STATE
////////////////////////////////////////////////////////////////////////////////

// SECTION 12.1 - UPDATE URL
function updateURL(){
  let params = [];

  if(currentCategory) params.push(`cat=${currentCategory._id}`);
  if(currentSubforum) params.push(`sub=${currentSubforum._id}`);
  if(currentThread) params.push(`thread=${currentThread._id}`);

  const query = params.length ? "?" + params.join("&") : "";
  history.replaceState(null,"",query);
}

// SECTION 12.2 - LOAD URL
async function loadFromURL(){
  const p = new URLSearchParams(location.search);

  const catId=p.get("cat");
  const subId=p.get("sub");
  const threadId=p.get("thread");

  if(!catId) return;

  const cats = await fetch('/api/categories').then(r=>r.json());
  const cat = cats.find(c=>c._id===catId);
  if(!cat) return;

  await openCategory(cat);

  if(subId){
    const subs = await fetch(`/api/subforums/${catId}`).then(r=>r.json());
    const sub = subs.find(s=>s._id===subId);
    if(!sub) return;

    await openSubforum(sub);

    if(threadId){
      const ths = await fetch(`/api/threads/${subId}`).then(r=>r.json());
      const th = ths.find(t=>t._id===threadId);
      if(th) await openThread(th);
    }
  }
}

</script>
</body>
</html>
