<!DOCTYPE html>
<html>
<head>
  <title>My Forum</title>

  <!-- ===================================================== -->
  <!-- SECTION 2.5 - STYLES -->
  <!-- ===================================================== -->
  <style>
    body { font-family: Arial; margin: 20px; }

    .box {
      padding: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .hidden { display: none; }

    button { margin-left: 5px; }
    small { color: #666; }

    /* ROW SYSTEM */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .row-left { flex: 1; text-align: left; }
    .row-center { flex: 1; text-align: center; }
    .row-right {
      flex: 1;
      text-align: right;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

<h1>My Forum</h1>

<!-- ===================================================== -->
<!-- SECTION 1.0 - USER SYSTEM -->
<!-- ===================================================== -->
<input id="username" placeholder="Username">
<button onclick="saveUser()">Save</button>

<hr>

<!-- ===================================================== -->
<!-- SECTION 2.0 - VIEW CONTAINERS -->
<!-- ===================================================== -->

<!-- SECTION 2.1 - CATEGORIES -->
<div id="viewCategories"></div>

<!-- SECTION 2.2 - SUBFORUMS -->
<div id="viewSubforums" class="hidden">
  <button onclick="goCategories()">← Back</button>
  <h2 id="categoryTitle"></h2>
  <div id="subforums"></div>
</div>

<!-- SECTION 2.3 - THREADS -->
<div id="viewThreads" class="hidden">
  <button onclick="goSubforums()">← Back</button>
  <h2 id="subforumTitle"></h2>

  <input id="threadTitleInput" placeholder="Thread title">
  <button onclick="createThread()">Create</button>

  <div id="threads"></div>
</div>

<!-- SECTION 2.4 - POSTS -->
<div id="viewPosts" class="hidden">
  <button onclick="goThreads()">← Back</button>

  <h2 id="threadTitle"></h2>

  <div id="posts"></div>

  <textarea id="postText"></textarea>
  <button onclick="addPost()">Reply</button>
</div>

<script>

////////////////////////////////////////////////////////////////////////////////
// SECTION 3.0 - STATE MANAGEMENT
////////////////////////////////////////////////////////////////////////////////

let currentCategory = null;
let currentSubforum = null;
let currentThread = null;

let threads = [];
let posts = [];

////////////////////////////////////////////////////////////////////////////////
// SECTION 4.0 - USER SYSTEM
////////////////////////////////////////////////////////////////////////////////

// SECTION 4.1 - INIT USER
const usernameInput = document.getElementById('username');

const savedUser = localStorage.getItem("user");
if (savedUser) usernameInput.value = savedUser;

// SECTION 4.2 - SAVE USER
function saveUser() {
  const name = usernameInput.value.trim();
  if (!name) return;
  localStorage.setItem("user", name);
}

// SECTION 4.3 - GET USER
function getUser() {
  return localStorage.getItem("user") || "Anonymous";
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 5.0 - VIEW SYSTEM
////////////////////////////////////////////////////////////////////////////////

// SECTION 5.1 - SHOW VIEW (FIXED SAFE SWITCHER)
function showView(view) {
  const views = {
    categories: "viewCategories",
    subforums: "viewSubforums",
    threads: "viewThreads",
    posts: "viewPosts"
  };

  Object.values(views).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add("hidden");
  });

  document.getElementById(views[view]).classList.remove("hidden");
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 6.0 - INIT
////////////////////////////////////////////////////////////////////////////////

loadCategories();

////////////////////////////////////////////////////////////////////////////////
// SECTION 7.0 - CATEGORIES
////////////////////////////////////////////////////////////////////////////////

// SECTION 7.1 - LOAD CATEGORIES
async function loadCategories() {
  const res = await fetch('/api/categories');
  const data = await res.json();

  const div = document.getElementById('viewCategories');
  div.innerHTML = '';

  data.forEach(c => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerText = c.name;
    el.onclick = () => openCategory(c);
    div.appendChild(el);
  });
}

// SECTION 7.2 - OPEN CATEGORY (RENDER SUBFORUMS)
async function openCategory(c) {
  currentCategory = c;

  showView("subforums");
  document.getElementById('categoryTitle').innerText = c.name;

  const res = await fetch(`/api/subforums/${c._id}`);
  const data = await res.json();

  const div = document.getElementById('subforums');
  div.innerHTML = '';

  data.forEach(s => {
    const el = document.createElement('div');
    el.className = 'box';

    const date = s.lastActivity
      ? new Date(s.lastActivity).toLocaleString()
      : "";

    el.innerHTML = `
      <div class="row">
        <div class="row-left">${s.name}</div>
        <div class="row-center">${s.threadCount || 0} Threads</div>
        <div class="row-right">${date}</div>
      </div>
    `;

    el.onclick = () => openSubforum(s);
    div.appendChild(el);
  });
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 8.0 - SUBFORUMS
////////////////////////////////////////////////////////////////////////////////

// SECTION 8.1 - OPEN SUBFORUM
async function openSubforum(s) {
  currentSubforum = s;

  showView("threads");
  document.getElementById('subforumTitle').innerText = s.name;

  const res = await fetch(`/api/threads/${s._id}`);
  threads = await res.json();

  renderThreads();
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 9.0 - THREADS
////////////////////////////////////////////////////////////////////////////////

// SECTION 9.1 - RENDER THREADS
function renderThreads() {
  const div = document.getElementById('threads');
  div.innerHTML = '';

  threads.forEach(t => {
    const el = document.createElement('div');
    el.className = 'box';

    const date = t.lastActivity
      ? new Date(t.lastActivity).toLocaleString()
      : "";

    el.innerHTML = `
      <div class="row">
        <div class="row-left">${t.author}</div>
        <div class="row-center">${t.replyCount || 0} Replies</div>
        <div class="row-right">${date}</div>
      </div>

      <div style="margin-top:6px;"><b>${t.title}</b></div>

      <div style="margin-top:6px;">
        <button onclick="editThread(event,'${t._id}','${t.title}')">Edit</button>
        <button onclick="deleteThread(event,'${t._id}')">Delete</button>
      </div>
    `;

    el.onclick = () => openThread(t);
    div.appendChild(el);
  });
}

// SECTION 9.2 - CREATE THREAD
async function createThread() {
  const title = document.getElementById('threadTitleInput').value;

  await fetch('/api/threads', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      title,
      subforumId: currentSubforum._id,
      author: getUser()
    })
  });

  openSubforum(currentSubforum);
}

// SECTION 9.3 - EDIT THREAD
async function editThread(e, id, oldTitle) {
  e.stopPropagation();

  const title = prompt("Edit thread title:", oldTitle);
  if (!title) return;

  await fetch(`/api/threads/${id}`, {
    method: "PUT",
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ title })
  });

  openSubforum(currentSubforum);
}

// SECTION 9.4 - DELETE THREAD
async function deleteThread(e, id) {
  e.stopPropagation();

  if (!confirm("Delete thread?")) return;

  await fetch(`/api/threads/${id}`, {
    method: "DELETE"
  });

  openSubforum(currentSubforum);
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 10.0 - POSTS
////////////////////////////////////////////////////////////////////////////////

// SECTION 10.1 - OPEN THREAD
async function openThread(t) {
  currentThread = t;

  showView("posts");
  document.getElementById('threadTitle').innerText = t.title;

  const res = await fetch(`/api/posts/${t._id}`);
  posts = await res.json();

  renderPosts();
}

// SECTION 10.2 - RENDER POSTS
function renderPosts() {
  const div = document.getElementById('posts');
  div.innerHTML = '';

  posts.forEach(p => {
    const el = document.createElement('div');
    el.className = 'box';

    const date = p.createdAt
      ? new Date(p.createdAt).toLocaleString()
      : "";

    el.innerHTML = `
      <b>${p.author}</b> <small>${date}</small><br>
      ${p.text}<br>

      <button onclick="editPost(event,'${p._id}','${p.text}')">Edit</button>
      <button onclick="deletePost(event,'${p._id}')">Delete</button>
    `;

    div.appendChild(el);
  });
}

// SECTION 10.3 - ADD POST
async function addPost() {
  await fetch('/api/posts', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      threadId: currentThread._id,
      text: document.getElementById('postText').value,
      author: getUser()
    })
  });

  openThread(currentThread);
}

// SECTION 10.4 - EDIT POST
async function editPost(e, id, oldText) {
  e.stopPropagation();

  const text = prompt("Edit post:", oldText);
  if (!text) return;

  await fetch(`/api/posts/${id}`, {
    method: "PUT",
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ text })
  });

  openThread(currentThread);
}

// SECTION 10.5 - DELETE POST
async function deletePost(e, id) {
  e.stopPropagation();

  if (!confirm("Delete post?")) return;

  await fetch(`/api/posts/${id}`, {
    method: "DELETE"
  });

  openThread(currentThread);
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 11.0 - NAVIGATION
////////////////////////////////////////////////////////////////////////////////

// SECTION 11.1 - BACK TO CATEGORIES
function goCategories() {
  currentCategory = null;
  currentSubforum = null;
  currentThread = null;

  loadCategories();
  showView("categories");
}

// SECTION 11.2 - BACK TO SUBFORUMS
function goSubforums() {
  if (!currentCategory) return;
  openCategory(currentCategory);
}

// SECTION 11.3 - BACK TO THREADS
function goThreads() {
  if (!currentSubforum) return;
  openSubforum(currentSubforum);
}

</script>

</body>
</html>
