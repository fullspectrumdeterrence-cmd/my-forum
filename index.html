<!DOCTYPE html>
<html>
<head>
  <title>My Forum</title>

  <style>
    body { font-family: Arial; margin: 20px; }

    .box {
      padding: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .hidden { display: none; }

    button { margin-left: 5px; }
    small { color: #666; }
  </style>
</head>

<body>

<h1>My Forum</h1>

<!-- ===================================================== -->
<!-- SECTION 1.0 - USER SYSTEM UI -->
<!-- ===================================================== -->
<input id="username" placeholder="Username">
<button onclick="saveUser()">Save</button>

<hr>

<!-- ===================================================== -->
<!-- SECTION 2.0 - VIEW CONTAINERS (CORE UI PAGES) -->
<!-- ===================================================== -->

<!-- SECTION 2.1 - CATEGORY VIEW -->
<div id="viewCategories"></div>

<!-- SECTION 2.2 - SUBFORUM VIEW -->
<div id="viewSubforums" class="hidden">
  <button onclick="goCategories()">← Back</button>
  <h2 id="categoryTitle"></h2>
  <div id="subforums"></div>
</div>

<!-- SECTION 2.3 - THREAD VIEW -->
<div id="viewThreads" class="hidden">
  <button onclick="goSubforums()">← Back</button>
  <h2 id="subforumTitle"></h2>

  <input id="threadTitleInput" placeholder="Thread title">
  <button onclick="createThread()">Create</button>

  <div id="threads"></div>
</div>

<!-- SECTION 2.4 - POSTS VIEW -->
<div id="viewPosts" class="hidden">
  <button onclick="goThreads()">← Back</button>

  <h2 id="threadTitle"></h2>

  <div id="posts"></div>

  <textarea id="postText"></textarea>
  <button onclick="addPost()">Reply</button>
</div>

<script>

////////////////////////////////////////////////////////////////////////////////
// SECTION 3.0 - STATE MANAGEMENT
////////////////////////////////////////////////////////////////////////////////

let currentCategory = null;
let currentSubforum = null;
let currentThread = null;

let threads = [];
let posts = [];

////////////////////////////////////////////////////////////////////////////////
// SECTION 4.0 - USER SYSTEM
////////////////////////////////////////////////////////////////////////////////

// SECTION 4.1 - Load user from localStorage
const usernameInput = document.getElementById('username');
const savedUser = localStorage.getItem("user");

if (savedUser) {
  usernameInput.value = savedUser;
}

// SECTION 4.2 - Save user
function saveUser() {
  const name = usernameInput.value.trim();
  if (!name) return;
  localStorage.setItem("user", name);
}

// SECTION 4.3 - Get user
function getUser() {
  return localStorage.getItem("user") || "Anonymous";
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 5.0 - VIEW CONTROLLER (FIXED STACK ISSUE 🔥)
////////////////////////////////////////////////////////////////////////////////

// SECTION 5.1 - MASTER VIEW SWITCHER (IMPORTANT FIX)
function showView(viewName) {
  const views = ["Categories", "Subforums", "Threads", "Posts"];

  views.forEach(v => {
    document.getElementById("view" + v).classList.add("hidden");
  });

  document.getElementById("view" + capitalize(viewName)).classList.remove("hidden");
}

// SECTION 5.2 - HELPER
function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 6.0 - INIT
////////////////////////////////////////////////////////////////////////////////

loadCategories();

////////////////////////////////////////////////////////////////////////////////
// SECTION 7.0 - CATEGORIES
////////////////////////////////////////////////////////////////////////////////

async function loadCategories() {
  const res = await fetch('/api/categories');
  const data = await res.json();

  const div = document.getElementById('viewCategories');
  div.innerHTML = '';

  data.forEach(c => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerText = c.name;
    el.onclick = () => openCategory(c);
    div.appendChild(el);
  });
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 8.0 - SUBFORUMS
////////////////////////////////////////////////////////////////////////////////

async function openCategory(c) {
  currentCategory = c;

  showView("subforums");

  document.getElementById('categoryTitle').innerText = c.name;

  const res = await fetch(`/api/subforums/${c._id}`);
  const data = await res.json();

  const div = document.getElementById('subforums');
  div.innerHTML = '';

  data.forEach(s => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerText = s.name;
    el.onclick = () => openSubforum(s);
    div.appendChild(el);
  });
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 9.0 - THREADS
////////////////////////////////////////////////////////////////////////////////

async function openSubforum(s) {
  currentSubforum = s;

  showView("threads");

  document.getElementById('subforumTitle').innerText = s.name;

  const res = await fetch(`/api/threads/${s._id}`);
  threads = await res.json();

  renderThreads();
}

// SECTION 9.1 - Render threads (WITH ACTIONS)
function renderThreads() {
  const div = document.getElementById('threads');
  div.innerHTML = '';

  threads.forEach(t => {
    const el = document.createElement('div');
    el.className = 'box';

    const date = t.createdAt ? new Date(t.createdAt).toLocaleString() : "";

    el.innerHTML = `
      <b>${t.title}</b><br>
      by ${t.author}<br>
      <small>${date} • ${t.replyCount || 0} replies</small><br>

      <button onclick="editThread(event,'${t._id}','${t.title}')">Edit</button>
      <button onclick="deleteThread(event,'${t._id}')">Delete</button>
    `;

    el.addEventListener("click", () => openThread(t));

    div.appendChild(el);
  });
}

// SECTION 9.2 - Create thread
async function createThread() {
  const title = document.getElementById('threadTitleInput').value;

  await fetch('/api/threads', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      title,
      subforumId: currentSubforum._id,
      author: getUser()
    })
  });

  openSubforum(currentSubforum);
}

  // SECTION 9.3 - THREAD ACTIONS

async function editThread(e, id, oldTitle) {
  e.stopPropagation();

  const title = prompt("Edit thread title:", oldTitle);
  if (!title) return;

  await fetch(`/api/threads/${id}`, {
    method: "PUT",
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ title })
  });

  openSubforum(currentSubforum);
}

async function deleteThread(e, id) {
  e.stopPropagation();

  if (!confirm("Delete this thread?")) return;

  await fetch(`/api/threads/${id}`, {
    method: "DELETE"
  });

  openSubforum(currentSubforum);
}

////////////////////////////////////////////////////////////////////////////////
// SECTION 10.0 - POSTS
////////////////////////////////////////////////////////////////////////////////

async function openThread(t) {
  currentThread = t;

  showView("posts");

  document.getElementById('threadTitle').innerText = t.title;

  const res = await fetch(`/api/posts/${t._id}`);
  posts = await res.json();

  renderPosts();
}

// SECTION 10.1 - Render posts (WITH ACTIONS)
function renderPosts() {
  const div = document.getElementById('posts');
  div.innerHTML = '';

  posts.forEach(p => {
    const el = document.createElement('div');
    el.className = 'box';

    const date = p.createdAt ? new Date(p.createdAt).toLocaleString() : "";

    el.innerHTML = `
      <b>${p.author}</b> <small>${date}</small><br>
      ${p.text}<br>

      <button onclick="editPost(event,'${p._id}','${p.text}')">Edit</button>
      <button onclick="deletePost(event,'${p._id}')">Delete</button>
    `;

    div.appendChild(el);
  });
}

// SECTION 10.2 - Add post
async function addPost() {
  await fetch('/api/posts', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      threadId: currentThread._id,
      text: document.getElementById('postText').value,
      author: getUser()
    })
  });

  openThread(currentThread);
}

  // SECTION 10.3 - POST ACTIONS

async function editPost(e, id, oldText) {
  e.stopPropagation();

  const text = prompt("Edit post:", oldText);
  if (!text) return;

  await fetch(`/api/posts/${id}`, {
    method: "PUT",
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ text })
  });

  openThread(currentThread);
}

async function deletePost(e, id) {
  e.stopPropagation();

  if (!confirm("Delete this post?")) return;

  await fetch(`/api/posts/${id}`, {
    method: "DELETE"
  });

  openThread(currentThread);
}
  
////////////////////////////////////////////////////////////////////////////////
// SECTION 11.0 - NAVIGATION (FIXED CLEAN BACK SYSTEM)
////////////////////////////////////////////////////////////////////////////////

// SECTION 11.1 - Back to categories (FULL RESET FIX)
function goCategories() {
  currentCategory = null;
  currentSubforum = null;
  currentThread = null;

  loadCategories();
  showView("categories");
}

// SECTION 11.2 - Back to subforums
function goSubforums() {
  if (!currentCategory) return;
  openCategory(currentCategory);
}

// SECTION 11.3 - Back to threads
function goThreads() {
  if (!currentSubforum) return;
  openSubforum(currentSubforum);
}

</script>

</body>
</html>
