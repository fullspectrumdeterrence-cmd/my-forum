<!DOCTYPE html>
<html>
<head>
  <title>My Forum</title>
  <style>
    body { font-family: Arial; margin: 20px; }

    .box {
      padding: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .hidden { display: none; }

    .btn {
      margin-left: 5px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>My Forum</h1>

<input id="username" placeholder="Username">
<button onclick="saveUser()">Save</button>

<hr>

<!-- CATEGORY VIEW -->
<div id="viewCategories"></div>

<!-- SUBFORUM VIEW -->
<div id="viewSubforums" class="hidden">
  <button onclick="backToCategories()">← Back</button>
  <h2 id="categoryTitle"></h2>
  <div id="subforums"></div>
</div>

<!-- THREAD VIEW -->
<div id="viewThreads" class="hidden">
  <button onclick="backToSubforums()">← Back</button>
  <h2 id="subforumTitle"></h2>

  <input id="threadTitleInput" placeholder="New thread title">
  <button onclick="createThread()">Create Thread</button>

  <div id="threads"></div>
</div>

<!-- POSTS VIEW -->
<div id="viewPosts" class="hidden">
  <button onclick="backToThreads()">← Back</button>

  <h2 id="threadTitle"></h2>

  <div id="posts"></div>

  <textarea id="postText"></textarea>
  <button onclick="addPost()">Reply</button>
</div>

<script>

// =====================
// STATE
// =====================
let categories = [];
let subforums = [];
let threads = [];
let posts = [];

let currentCategory = null;
let currentSubforum = null;
let currentThread = null;

// =====================
// VIEW RESET (KEY FIX)
// =====================
function hideAllViews() {
  document.getElementById('viewCategories').classList.add('hidden');
  document.getElementById('viewSubforums').classList.add('hidden');
  document.getElementById('viewThreads').classList.add('hidden');
  document.getElementById('viewPosts').classList.add('hidden');
}

// =====================
// USER
// =====================
const savedUser = localStorage.getItem("user");
if (savedUser) document.getElementById("username").value = savedUser;

function saveUser() {
  localStorage.setItem("user", document.getElementById("username").value);
}

// =====================
// LOAD CATEGORIES
// =====================
async function loadCategories() {
  hideAllViews();
  document.getElementById('viewCategories').classList.remove('hidden');

  categories = await (await fetch('/api/categories')).json();

  const div = document.getElementById('viewCategories');
  div.innerHTML = '';

  categories.forEach(c => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerText = c.name;
    el.onclick = () => openCategory(c);
    div.appendChild(el);
  });
}

// =====================
// OPEN CATEGORY
// =====================
async function openCategory(category) {
  currentCategory = category;

  hideAllViews();
  document.getElementById('viewSubforums').classList.remove('hidden');

  document.getElementById('categoryTitle').innerText = category.name;

  const div = document.getElementById('subforums');
  div.innerHTML = '';

  subforums = await (await fetch(`/api/subforums/${category._id}`)).json();

  subforums.forEach(s => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerText = s.name;
    el.onclick = () => openSubforum(s);
    div.appendChild(el);
  });
}

// =====================
// OPEN SUBFORUM
// =====================
async function openSubforum(subforum) {
  currentSubforum = subforum;

  hideAllViews();
  document.getElementById('viewThreads').classList.remove('hidden');

  document.getElementById('subforumTitle').innerText = subforum.name;

  const div = document.getElementById('threads');
  div.innerHTML = '';

  threads = await (await fetch(`/api/threads/${subforum._id}`)).json();

  renderThreads();
}

// =====================
// CREATE THREAD
// =====================
async function createThread() {
  const title = document.getElementById('threadTitleInput').value;
  const author = document.getElementById('username').value;

  if (!title || !author) return alert("Missing data");

  await fetch('/api/threads', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      title,
      subforumId: currentSubforum._id,
      author
    })
  });

  document.getElementById('threadTitleInput').value = '';
  openSubforum(currentSubforum);
}

// =====================
// RENDER THREADS
// =====================
function renderThreads() {
  const div = document.getElementById('threads');
  div.innerHTML = '';

  // Create table
  const table = document.createElement('table');
  table.style.width = '100%';
  table.style.borderCollapse = 'collapse';

  table.innerHTML = `
    <tr style="background:#eee;">
      <th style="text-align:left; padding:8px;">Thread</th>
      <th style="padding:8px;">Author</th>
      <th style="padding:8px;">Replies</th>
      <th style="padding:8px;">Last Activity</th>
    </tr>
  `;

  threads.forEach(t => {
    const row = document.createElement('tr');
    row.style.borderBottom = '1px solid #ccc';

    const date = new Date(t.lastActivity || t.createdAt).toLocaleString();

    row.innerHTML = `
      <td style="padding:8px; cursor:pointer; color:blue;">
        ${t.title}
      </td>
      <td style="text-align:center;">${t.author}</td>
      <td style="text-align:center;">${t.replyCount || 0}</td>
      <td style="text-align:center; font-size:12px; color:gray;">
        ${date}
      </td>
    `;

    // Click opens thread
    row.onclick = () => openThread(t);

    table.appendChild(row);
  });

  div.appendChild(table);
}

// =====================
// OPEN THREAD
// =====================
async function openThread(thread) {
  currentThread = thread;

  hideAllViews();
  document.getElementById('viewPosts').classList.remove('hidden');

  document.getElementById('threadTitle').innerText = thread.title;

  const div = document.getElementById('posts');
  div.innerHTML = '';

  posts = await (await fetch(`/api/posts/${thread._id}`)).json();

  renderPosts();
}

// =====================
// ADD POST
// =====================
async function addPost() {
  const text = document.getElementById('postText').value;
  const author = document.getElementById('username').value;

  if (!text || !author) return alert("Missing data");

  await fetch('/api/posts', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      threadId: currentThread._id,
      text,
      author
    })
  });

  document.getElementById('postText').value = '';
  openThread(currentThread);
}

// =====================
// RENDER POSTS
// =====================
function renderPosts() {
  const div = document.getElementById('posts');
  div.innerHTML = '';

  posts.forEach(p => {
    const el = document.createElement('div');
    el.className = 'box';
   const date = new Date(p.createdAt).toLocaleString();

el.innerHTML = `
  <b>${p.author}</b> 
  <span style="color:gray; font-size:12px;">(${date})</span>
  <br>
  ${p.text}
`;
    div.appendChild(el);
  });
}

// =====================
// BACK NAVIGATION (FIXED)
// =====================
function backToCategories() {
  loadCategories();
}

function backToSubforums() {
  openCategory(currentCategory);
}

function backToThreads() {
  openSubforum(currentSubforum);
}

// =====================
// INIT
// =====================
loadCategories();

</script>

</body>
</html>
