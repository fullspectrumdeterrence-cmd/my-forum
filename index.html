<!DOCTYPE html>
<html>
<head>
  <title>My Forum</title>

  <style>
    body { font-family: Arial; margin: 20px; }

    .box {
      padding: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .hidden { display: none; }
  </style>
</head>

<body>

<h1>My Forum</h1>

<input id="username" placeholder="Username">
<button onclick="saveUser()">Save</button>

<hr>

<!-- ===================== -->
<!-- VIEWS -->
<!-- ===================== -->
<div id="viewCategories"></div>

<div id="viewSubforums" class="hidden">
  <button onclick="goCategories()">← Back</button>
  <h2 id="categoryTitle"></h2>
  <div id="subforums"></div>
</div>

<div id="viewThreads" class="hidden">
  <button onclick="goSubforums()">← Back</button>
  <h2 id="subforumTitle"></h2>

  <input id="threadTitleInput" placeholder="New thread title">
  <button onclick="createThread()">Create</button>

  <div id="threads"></div>
</div>

<div id="viewPosts" class="hidden">
  <button onclick="goThreads()">← Back</button>

  <h2 id="threadTitle"></h2>

  <div id="posts"></div>

  <textarea id="postText"></textarea>
  <button onclick="addPost()">Reply</button>
</div>

<script>

// =====================
// STATE
// =====================
let categories = [];
let subforums = [];
let threads = [];
let posts = [];

let currentCategory = null;
let currentSubforum = null;
let currentThread = null;

// =====================
// USER
// =====================
function saveUser() {
  localStorage.setItem("user", document.getElementById("username").value);
}

const saved = localStorage.getItem("user");
if (saved) document.getElementById("username").value = saved;

// =====================
// NAVIGATION HELPERS
// =====================
function show(el) { el.classList.remove('hidden'); }
function hide(el) { el.classList.add('hidden'); }

function resetViews() {
  hide(document.getElementById('viewCategories'));
  hide(document.getElementById('viewSubforums'));
  hide(document.getElementById('viewThreads'));
  hide(document.getElementById('viewPosts'));
}

// =====================
// LOAD CATEGORIES
// =====================
async function loadCategories() {
  resetViews();
  show(document.getElementById('viewCategories'));

  categories = await (await fetch('/api/categories')).json();

  const div = document.getElementById('viewCategories');
  div.innerHTML = '';

  categories.forEach(c => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerText = c.name;

    el.onclick = () => openCategory(c);

    div.appendChild(el);
  });
}

// =====================
// CATEGORY → SUBFORUMS
// =====================
async function openCategory(cat) {
  currentCategory = cat;

  resetViews();
  show(document.getElementById('viewSubforums'));

  document.getElementById('categoryTitle').innerText = cat.name;

  subforums = await (await fetch(`/api/subforums/${cat._id}`)).json();

  const div = document.getElementById('subforums');
  div.innerHTML = '';

  subforums.forEach(s => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerText = s.name;
    el.onclick = () => openSubforum(s);
    div.appendChild(el);
  });
}

// =====================
// SUBFORUM → THREADS
// =====================
async function openSubforum(sub) {
  currentSubforum = sub;

  resetViews();
  show(document.getElementById('viewThreads'));

  document.getElementById('subforumTitle').innerText = sub.name;

  threads = await (await fetch(`/api/threads/${sub._id}`)).json();
  renderThreads();
}

// =====================
// THREADS
// =====================
function renderThreads() {
  const div = document.getElementById('threads');
  div.innerHTML = '';

  threads.forEach(t => {
    const el = document.createElement('div');
    el.className = 'box';

    el.innerHTML = `<b>${t.title}</b><br>by ${t.author}`;

    el.onclick = () => openThread(t);

    div.appendChild(el);
  });
}

// =====================
// THREAD → POSTS
// =====================
async function openThread(thread) {
  currentThread = thread;

  resetViews();
  show(document.getElementById('viewPosts'));

  document.getElementById('threadTitle').innerText = thread.title;

  posts = await (await fetch(`/api/posts/${thread._id}`)).json();
  renderPosts();
}

// =====================
// POSTS
// =====================
function renderPosts() {
  const div = document.getElementById('posts');
  div.innerHTML = '';

  posts.forEach(p => {
    const el = document.createElement('div');
    el.className = 'box';
    el.innerHTML = `<b>${p.author}</b>: ${p.text}`;
    div.appendChild(el);
  });
}

// =====================
// CREATE THREAD
// =====================
async function createThread() {
  const title = document.getElementById('threadTitleInput').value;
  const author = document.getElementById('username').value;

  await fetch('/api/threads', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      title,
      subforumId: currentSubforum._id,
      author
    })
  });

  openSubforum(currentSubforum);
}

// =====================
// ADD POST
// =====================
async function addPost() {
  const text = document.getElementById('postText').value;
  const author = document.getElementById('username').value;

  await fetch('/api/posts', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      threadId: currentThread._id,
      text,
      author
    })
  });

  openThread(currentThread);
}

// =====================
// BACK NAVIGATION (FIXED)
// =====================
function goCategories() {
  loadCategories();
}

function goSubforums() {
  openCategory(currentCategory);
}

function goThreads() {
  openSubforum(currentSubforum);
}

// =====================
// INIT
// =====================
loadCategories();

</script>

</body>
</html>
