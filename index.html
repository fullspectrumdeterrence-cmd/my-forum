<!DOCTYPE html>
<html>
<head>
  <title>My Forum</title>
  <style>
    body { font-family: Arial; margin: 20px; }

    .post, .reply {
      padding: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    .btn {
      margin-left: 5px;
      cursor: pointer;
      font-size: 0.8em;
      padding: 2px 5px;
    }

    #threadView { display: none; }
  </style>
</head>

<body>

<h1>My Forum</h1>

<!-- MAIN VIEW -->
<div id="mainView">
  <input id="username" placeholder="Your name" />

  <button onclick="switchUser()">Switch User</button>

  <br><br>

  <textarea id="postInput" placeholder="Write a post..." rows="4"></textarea>

  <br><br>

  <select id="categorySelect">
    <option value="General">General</option>
    <option value="News">News</option>
    <option value="Tech">Tech</option>
  </select>

  <br><br>

  <button onclick="addPost()">Post</button>

  <h2>Posts</h2>
  <div id="posts"></div>
</div>

<!-- THREAD VIEW -->
<div id="threadView">
  <button onclick="goBack()">← Back</button>
  <h2 id="threadTitle"></h2>

  <h3>Replies</h3>
  <div id="replies"></div>

  <textarea id="replyInput" placeholder="Write a reply..." rows="3"></textarea>

  <br><br>

  <button onclick="addReply()">Reply</button>
</div>

<script>

let posts = [];
let currentPost = null;
const usernameInput = document.getElementById('username');


// =====================
// HELPER: ENSURE USERNAME
// =====================
function ensureUsername() {
  if (!usernameInput.value.trim()) {
    usernameInput.value = "Guest";
  }
}


// =====================
// LOAD POSTS
// =====================
async function loadPosts() {
  const res = await fetch('/api/posts');
  posts = await res.json();
  renderPosts();
}


// =====================
// SWITCH USER
// =====================
function switchUser() {
  const newUser = prompt("Enter username:", usernameInput.value);
  if (!newUser) return;
  usernameInput.value = newUser;
}


// =====================
// ADD POST
// =====================
async function addPost() {

  ensureUsername();

  const text = document.getElementById('postInput').value.trim();
  const author = usernameInput.value.trim();
  const category = document.getElementById('categorySelect').value;

  if (!text || !author) return alert("Missing data");

  await fetch('/api/posts', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ text, author, category })
  });

  document.getElementById('postInput').value = '';
  loadPosts();
}


// =====================
// RENDER POSTS
// =====================
function renderPosts() {
  const postsDiv = document.getElementById('posts');
  postsDiv.innerHTML = '';

  posts.forEach(post => {
    const div = document.createElement('div');
    div.className = 'post';

    div.innerHTML = `
      <strong>${post.author}</strong> (${post.category})<br>

      <span style="cursor:pointer; color:blue;"
        onclick="openThread('${post._id}')">
        ${post.text}
      </span>
    `;

    postsDiv.appendChild(div);
  });
}


// =====================
// OPEN THREAD
// =====================
function openThread(postId) {
  window.location.href = `/post/${postId}`;
}


// =====================
// LOAD THREAD
// =====================
async function loadThreadIfNeeded() {
  const path = window.location.pathname;

  if (path.startsWith('/post/')) {
    const id = path.split('/post/')[1];

    const res = await fetch(`/api/post/${id}`);
    const post = await res.json();

    currentPost = post;

    document.getElementById('mainView').style.display = 'none';
    document.getElementById('threadView').style.display = 'block';

    document.getElementById('threadTitle').innerText = post.text;

    renderReplies();
  }
}


// =====================
// ADD REPLY
// =====================
async function addReply() {

  ensureUsername();

  const text = document.getElementById('replyInput').value.trim();
  const author = usernameInput.value.trim();

  if (!text) {
    alert("Please write a reply");
    return;
  }

  if (!currentPost || !currentPost._id) {
    alert("Thread not loaded properly. Refresh and try again.");
    return;
  }

  const res = await fetch(`/api/posts/${currentPost._id}/replies`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ text, author })
  });

  if (!res.ok) {
    alert("Server error");
    return;
  }

  const reply = await res.json();

  if (!currentPost.replies) currentPost.replies = [];
  currentPost.replies.push(reply);

  document.getElementById('replyInput').value = '';
  renderReplies();
}


// =====================
// RENDER REPLIES
// =====================
function renderReplies() {
  const repliesDiv = document.getElementById('replies');
  repliesDiv.innerHTML = '';

  if (!currentPost || !currentPost.replies) return;

  currentPost.replies.forEach(reply => {
    const div = document.createElement('div');
    div.className = 'reply';

    div.innerHTML = `
      <strong>${reply.author}</strong>: ${reply.text}
    `;

    repliesDiv.appendChild(div);
  });
}


// =====================
// BACK BUTTON
// =====================
function goBack() {
  window.location.href = '/';
}


// =====================
// INIT
// =====================
loadPosts();
loadThreadIfNeeded();

</script>

</body>
</html>
