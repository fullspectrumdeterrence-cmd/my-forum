<!DOCTYPE html>
<html>
<head>
  <title>My Forum</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    .post, .reply { padding: 10px; border: 1px solid #ccc; margin-bottom: 10px; }
    .btn { margin-left: 5px; cursor: pointer; font-size: 0.8em; }
  </style>
</head>

<body>

<h1>My Forum</h1>

<input id="username" placeholder="Your name">
<button onclick="saveUser()">Save User</button>

<hr>

<!-- MAIN VIEW -->
<div id="mainView">
  <textarea id="postInput" placeholder="Write post"></textarea>
  <br>
  <select id="category">
    <option>General</option>
    <option>News</option>
    <option>Tech</option>
  </select>
  <button onclick="createPost()">Post</button>

  <h2>Posts</h2>
  <div id="posts"></div>
</div>

<!-- THREAD VIEW -->
<div id="threadView" style="display:none;">
  <button onclick="back()">← Back</button>
  <h2 id="title"></h2>

  <div id="replies"></div>

  <textarea id="replyInput"></textarea>
  <button onclick="addReply()">Reply</button>
</div>

<script>

let posts = [];
let currentPost = null;

// =====================
// USER SYSTEM
// =====================
const savedUser = localStorage.getItem("user");
if (savedUser) document.getElementById("username").value = savedUser;

function saveUser() {
  localStorage.setItem("user", document.getElementById("username").value);
}

// =====================
// LOAD POSTS
// =====================
async function loadPosts() {
  posts = await (await fetch('/api/posts')).json();
  renderPosts();
}

// =====================
// CREATE POST
// =====================
async function createPost() {
  const text = document.getElementById('postInput').value;
  const author = document.getElementById('username').value;
  const category = document.getElementById('category').value;

  await fetch('/api/posts', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({text, author, category})
  });

  loadPosts();
}

// =====================
// RENDER POSTS
// =====================
function renderPosts() {
  const div = document.getElementById('posts');
  div.innerHTML = '';

  posts.forEach(p => {
    const el = document.createElement('div');
    el.className = 'post';

    el.innerHTML = `
      <b>${p.author}</b> (${p.category})<br>
      <span onclick="openPost('${p._id}')" style="color:blue;cursor:pointer;">
        ${p.text}
      </span>
    `;

    div.appendChild(el);
  });
}

// =====================
// OPEN POST (SPA)
// =====================
async function openPost(id) {
  currentPost = await (await fetch('/api/posts/' + id)).json();

  document.getElementById('mainView').style.display = 'none';
  document.getElementById('threadView').style.display = 'block';

  document.getElementById('title').innerText = currentPost.text;
  renderReplies();
}

// =====================
// BACK
// =====================
function back() {
  document.getElementById('threadView').style.display = 'none';
  document.getElementById('mainView').style.display = 'block';
}

// =====================
// ADD REPLY
// =====================
async function addReply() {
  const text = document.getElementById('replyInput').value;
  const author = document.getElementById('username').value;

  await fetch(`/api/posts/${currentPost._id}/replies`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({text, author})
  });

  openPost(currentPost._id);
}

// =====================
// RENDER REPLIES
// =====================
function renderReplies() {
  const div = document.getElementById('replies');
  div.innerHTML = '';

  currentPost.replies.forEach((r,i) => {
    const el = document.createElement('div');
    el.className = 'reply';

    el.innerHTML = `
      <b>${r.author}</b>: ${r.text}
      <button onclick="deleteReply(${i})">Delete</button>
    `;

    div.appendChild(el);
  });
}

// =====================
// DELETE REPLY
// =====================
async function deleteReply(index) {
  await fetch(`/api/posts/${currentPost._id}/replies/${index}`, {
    method:'DELETE'
  });

  openPost(currentPost._id);
}

// INIT
loadPosts();

</script>

</body>
</html>
